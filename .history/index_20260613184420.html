<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alba Player</title>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>

  <style>
    body {
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    /* Menu Styles */
    .aplr-menu {
      list-style: none;
      padding: 15px;
      margin: 0;
      display: flex;
      background: #111;
      justify-content: center;
      gap: 10px;
    }

    .aplr-link {
      color: #ccc;
      text-decoration: none;
      padding: 8px 18px;
      background: #222;
      border-radius: 4px;
      font-size: 14px;
      border: 1px solid #333;
      transition: 0.3s;
    }

    .aplr-link.active {
      background: #ff0101;
      color: #fff;
      border-color: #ff0101;
    }

    .aplr-link:hover {
      background: #444;
    }

    /* Player Container */
    .video-con {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    /* The Click Overlay with the Triangle */
    #click-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      /* Darkens the background slightly */
      transition: background 0.3s;
    }

    #click-overlay:hover {
      background: rgba(0, 0, 0, 0.1);
      /* Brightens on hover */
    }

    /* The Triangle (Play Button) */
    .play-button {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid #fff;
      transition: transform 0.2s ease-in-out;
    }

    /* The SVG Triangle icon */
    .play-button svg {
      width: 40px;
      height: 40px;
      fill: white;
      margin-left: 5px;
      /* Centers the triangle visually */
    }

    #click-overlay:hover .play-button {
      transform: scale(1.1);
      background: rgba(255, 0, 0, 0.8);
      border-color: #ff0101;
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div class="aplr-player-wrapper">
    <!-- Menu -->
    <ul class="aplr-menu">
      <li><a class="aplr-link active" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=1">بث رئيسي</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=2">جوال</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=3">بث احتياطي</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=4">English</a></li>
    </ul>

    <div class="video-con">
      <!-- Click Overlay with the Triangle Icon -->
      <div id="click-overlay">
        <div class="play-button">
          <svg viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
        </div>
      </div>

      <!-- Actual Player -->
      <div id="player"></div>
    </div>
  </div>

  <script>
    // Initialize the Player
    var player = new Clappr.Player({
      source: "https://3cup-live.s3.eu-west-3.amazonaws.com/max1/master.m3u8",
      parentId: "#player",
      plugins: [LevelSelector],
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: true,
    });

    // Handle Click logic
    const overlay = document.getElementById('click-overlay');
    const targetLink = "https://z1.depoooo.com/albaplayer/bein-1/?serv=1";

    overlay.addEventListener('click', function () {
      // 1. Open the link
      window.open(targetLink, '_blank');

      // 2. Hide the overlay so the user can control the video
      overlay.style.display = 'none';

      // 3. Play/Unmute the video
      player.play();
      player.setVolume(100);
    });
  </script>

</body>

</html>
