<!DOCTYPE html>
<html>

<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body {
            margin: 0;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;

<body>

        allowfullscreen>
    </iframe>
</body>

</html>
