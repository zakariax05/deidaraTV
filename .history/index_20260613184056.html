<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alba Player</title>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>

  <style>
    body {
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* Menu Styles */
    .aplr-menu {
      list-style: none;
      padding: 10px;
      margin: 0;
      display: flex;
      background: #111;
      direction: rtl;
      justify-content: center;
    }

    .aplr-menu li {
      margin: 0 5px;
    }

    .aplr-link {
      color: #ccc;
      text-decoration: none;
      padding: 6px 12px;
      background: #222;
      border-radius: 3px;
      font-size: 13px;
      border: 1px solid #333;
    }

    .aplr-link.active {
      background: #ff0101;
      color: #fff;
      border-color: #ff0101;
    }

    /* Player Container */
    .video-con {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    /* The Invisible Click Layer */
    #click-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      /* Sits on top of the player */
      cursor: pointer;
      background: rgba(0, 0, 0, 0);
      /* Transparent */
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div class="aplr-player-wrapper">
    <!-- Menu -->
    <ul class="aplr-menu">
      <li><a class="aplr-link active" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=1">بث رئيسي</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=2">جوال</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=3">بث احتياطي</a></li>
      <li><a class="aplr-link" href="https://z1.depoooo.com/albaplayer/bein-1/?serv=4">English</a></li>
    </ul>

    <div class="video-con">
      <!-- Click Overlay: This handles the link redirect -->
      <div id="click-overlay"></div>

      <!-- Actual Player -->
      <div id="player"></div>
    </div>
  </div>

  <script>
    // 1. Initialize the Player
    var player = new Clappr.Player({
      source: "https://3cup-live.s3.eu-west-3.amazonaws.com/max1/master.m3u8",
      parentId: "#player",
      plugins: [LevelSelector],
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: true,
      mimeType: "application/x-mpegURL",
    });

    // 2. Click Logic: Open link when clicking the video
    const overlay = document.getElementById('click-overlay');
    const targetLink = "https://z1.depoooo.com/albaplayer/bein-1/?serv=1";

    overlay.addEventListener('click', function () {
      // Open the link in a new tab
      window.open(targetLink, '_blank');

      // OPTIONAL: Remove the overlay after the first click 
      // so the user can use the volume/pause buttons.
      overlay.style.display = 'none';

      // Try to play the video in case autoplay was blocked
      player.play();
    });
  </script>

</body>

</html>
